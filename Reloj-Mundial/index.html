<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reloj Mundial • Game Boy</title>
  <!-- Fuentes pixel art -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Luxon -->
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
</head>
<body>
  <div class="gameboy" id="gameboy">
    <!-- Etiqueta superior -->
    <div class="brand">GAME BOY</div>

    <!-- Pantalla verde -->
    <div class="screen">
      <div class="screen-inner">
        <header>
          <h1>RELOJ MUNDIAL</h1>
          <button id="btn-tema" class="btn-tema">☀️</button>
        </header>

        <div id="zona-relojes" class="zona-relojes"></div>

        <div class="agregar-ciudad">
          <div class="buscador-wrapper">
            <input type="text" id="input-ciudad" placeholder="Buscar ciudad..." autocomplete="off">
            <ul id="sugerencias" class="sugerencias oculto"></ul>
          </div>
          <button id="btn-agregar" class="btn-accion">+</button>
        </div>
      </div>
    </div>

    <!-- Controles decorativos -->
    <div class="controls">
      <div class="dpad">
        <div class="dpad-vertical"></div>
        <div class="dpad-horizontal"></div>
        <div class="dpad-center"></div>
      </div>
      <div class="action-buttons">
        <div class="btn-b">B</div>
        <div class="btn-a">A</div>
      </div>
    </div>

    <!-- Altavoz decorativo -->
    <div class="speaker">
      <div class="speaker-lines">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- SECCIÓN ABOUT ME -->
    <div class="about-section">
      <div class="about-title">ABOUT ME</div>
      <p class="about-name">Jeishoon</p>
      <div class="social-links">
        <a href="https://discord.gg/7ZGPbqZxKp" target="_blank" rel="noopener" class="btn-social btn-discord">DISCORD</a>
        <a href="https://ko-fi.com/aeshon" target="_blank" rel="noopener" class="btn-social btn-kofi">☕ KO-FI</a>
      </div>
    </div>
  </div>
  <script src="clima.js"></script>
  <script src="script.js"></script>
</body>
</html>
